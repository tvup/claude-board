services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
    node:
        image: 'sail-8.5/app'
        working_dir: /var/www/html
        command: npm run dev
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            VITE_PORT: '${VITE_PORT:-5173}'
        volumes:
            - '.:/var/www/html'
        ports:
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        networks:
            - sail
networks:
    sail:
        driver: bridge
