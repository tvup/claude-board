services:
    laravel.test:
        build:
            context: .
            dockerfile: .github/docker/Dockerfile
            target: development
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: claude-board-dev
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-8080}:80'
        environment:
            APP_ENV: local
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
    redis:
        image: 'redis:8-alpine'
        command: [ 'redis-server', '--appendonly', 'yes' ]
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    node:
        image: claude-board-dev
        working_dir: /var/www/html
        entrypoint: []
        command: npm run dev -- --host
        environment:
            VITE_PORT: '${VITE_PORT:-5173}'
        volumes:
            - '.:/var/www/html'
        ports:
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        networks:
            - sail
        depends_on:
            - laravel.test
networks:
    sail:
        driver: bridge

volumes:
    sail-redis:
        driver: local
