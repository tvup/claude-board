services:
  claude-board:
    image: ghcr.io/tvup/claude-board:latest
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - claude-board-data:/data
    environment:
      APP_LOCALE: "${APP_LOCALE:-en}"
      CLAUDE_BILLING_MODEL: "${CLAUDE_BILLING_MODEL:-subscription}"
      CLAUDE_USAGE_API_URL: "${CLAUDE_USAGE_API_URL:-}"
      CLAUDE_USAGE_CACHE_TTL: "${CLAUDE_USAGE_CACHE_TTL:-20}"
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  claude-board-data:
  redis-data:
